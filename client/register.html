<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座席を譲る - train_seat</title>
    <style>
        :root {
            --primary-color: #2e7d32; /* 安心感のある緑色 */
            --bg-color: #f5f5f5;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1b5e20;
        }

        #message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            padding: 0.8rem;
            border-radius: 4px;
            display: none;
        }

        .success { background-color: #e8f5e9; color: #2e7d32; }
        .error { background-color: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>座席情報を登録</h2>
    <form id="seatForm">
        <div class="form-group">
            <label for="train_id">列車番号・路線名</label>
            <input type="text" id="train_id" placeholder="例: のぞみ1号, 山手線外回り" required>
        </div>
        <div class="form-group">
            <label for="car_number">号車番号</label>
            <input type="number" id="car_number" placeholder="例: 5" required min="1">
        </div>
        <div class="form-group">
            <label for="seat_number">座席番号</label>
            <input type="number" id="seat_number" placeholder="例: 12" required min="1">
        </div>
        <button type="submit">この席を譲るリストに登録</button>
    </form>
    <div id="message"></div>
</div>

<script>
    document.getElementById('seatForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const messageDiv = document.getElementById('message');
        const formData = new FormData();
        formData.append('train_id', document.getElementById('train_id').value);
        formData.append('car_number', document.getElementById('car_number').value);
        formData.append('seat_number', document.getElementById('seat_number').value);

        try {
            const response = await fetch('https://notice-ymgs.f5.si/100v9/set.php', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                showMessage('登録が完了しました。ありがとうございます！', 'success');
                document.getElementById('seatForm').reset();
            } else {
                showMessage('登録に失敗しました。サーバーエラーが発生しています。', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('接続エラーが発生しました。', 'error');
        }
    });

    function showMessage(text, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.innerText = text;
        messageDiv.className = type;
        messageDiv.style.display = 'block';
    }
</script>

</body>
</html>
